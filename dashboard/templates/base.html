<!doctype html>
<html lang="en" class="bg-[#0a0a0a] text-[#e8e8e8]">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Plivo Mirror{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-dim: #a0a0a0;
      --mint: #6ee7b7;
      --blue: #60a5fa;
      --amber: #fbbf24;
      --red: #f87171;
      --emerald: #34d399;
    }
    html, body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      -webkit-font-smoothing: antialiased;
    }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .surface { background-color: var(--surface); border: 1px solid var(--border); }
    .surface-2 { background-color: var(--surface-2); }
    .border-faint { border-color: var(--border); }
    .text-dim { color: var(--text-dim); }
    .pulse-dot {
      animation: pulse 2.2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .slide-in {
      animation: slidein 0.25s ease-out;
    }
    @keyframes slidein {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
  </style>
</head>
<body class="min-h-screen">

<header class="border-b border-faint sticky top-0 z-30 bg-[#0a0a0a]/90 backdrop-blur">
  <div class="max-w-[1400px] mx-auto px-6 py-3 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2.5">
      <span class="w-2 h-2 rounded-full bg-emerald-400 pulse-dot"></span>
      <span class="font-semibold tracking-tight">Plivo&nbsp;Mirror</span>
      <span class="text-dim text-xs mono ml-1">v0.5</span>
    </a>

    <div class="flex items-center gap-4">
      <label class="text-dim text-xs">Agent</label>
      <select hx-post="/set-agent" hx-trigger="change" hx-target="#agent-selector"
              hx-swap="outerHTML" name="agent_name" id="agent-selector"
              class="bg-transparent border border-faint rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500/30">
        {% for a in (agents or ['pizza-plivo']) %}
          <option value="{{ a }}" {% if a == (current_agent or 'pizza-plivo') %}selected{% endif %}>{{ a }}</option>
        {% endfor %}
      </select>

      {% if mirror_enabled %}
        <button hx-post="/toggle-mirror" hx-target="#mirror-toggle" hx-swap="outerHTML"
                id="mirror-toggle"
                title="Toggles Mirror for new calls. Active calls are unaffected."
                class="inline-flex items-center gap-2 rounded-full px-3 py-1.5 text-sm font-medium
                       bg-emerald-400/10 text-emerald-300 border border-emerald-400/30 hover:bg-emerald-400/20 transition">
          <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
          Mirror: ON
        </button>
      {% else %}
        <button hx-post="/toggle-mirror" hx-target="#mirror-toggle" hx-swap="outerHTML"
                id="mirror-toggle"
                title="Toggles Mirror for new calls. Active calls are unaffected."
                class="inline-flex items-center gap-2 rounded-full px-3 py-1.5 text-sm font-medium
                       bg-zinc-700/40 text-zinc-300 border border-zinc-600 hover:bg-zinc-700/60 transition">
          <span class="w-2 h-2 rounded-full bg-zinc-400"></span>
          Mirror: OFF
        </button>
      {% endif %}

      <a href="/compare" class="text-sm text-dim hover:text-white transition">Compare</a>
      <a href="/fixes" class="text-sm text-dim hover:text-white transition flex items-center gap-1.5">
        Pending Fixes
        <span id="pending-fixes-badge"
              hx-get="/fixes/pending-count.json"
              hx-trigger="load, every 10s"
              hx-swap="none"
              hx-on::after-request="
                try {
                  const c = JSON.parse(event.detail.xhr.response).count || 0;
                  this.textContent = c;
                  this.classList.toggle('hidden', c === 0);
                } catch(e){}"
              class="hidden text-[10px] mono px-1.5 py-0.5 rounded-full bg-amber-400/15 text-amber-300 border border-amber-400/30">
          0
        </span>
      </a>
      <button class="text-dim hover:text-white transition" title="Settings (not implemented)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="max-w-[1400px] mx-auto px-6 py-6">
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}

</body>
</html>
